name: camda_app
description: CAMDA App - Versão Flutter do Dashboard de Gestão de Estoque
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP / API
  http: ^1.2.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Gráficos
  fl_chart: ^0.68.0

  # Animações
  flutter_animate: ^4.5.0

  # Efeito glassmorphism
  glassmorphism: ^3.0.0

  # Internacionalização
  intl: ^0.19.0

  # Variáveis de ambiente
  flutter_dotenv: ^5.1.0

  # Ícones extras
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296

  # Utilidades
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.0

  # Câmera (para Pendências de Entrega)
  image_picker: ^1.1.2

  # Fontes Google
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
